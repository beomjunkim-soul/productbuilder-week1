<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 넘버 만들기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <section class="generator-panel" aria-labelledby="app-title">
            <div class="panel-copy">
                <p class="eyebrow">빨리 골라</p>
                <h1 id="app-title">로또 넘버 만들기</h1>
                <p class="subtitle">버튼을 누르면 중복 없는 6개 번호와 보너스 번호를 바로 만들 수 있어요.</p>
            </div>

            <section class="result-area" aria-live="polite" aria-label="Generated lotto numbers">
                <div class="result-header">
                    <span>추천 번호</span>
                    <span class="draw-status">준비</span>
                </div>
                <div class="lotto-balls-container"></div>
            </section>

            <div class="actions">
                <button class="generate-btn" type="button">
                    번호 만들기
                </button>
                <button class="theme-toggle" type="button" aria-pressed="false" aria-label="다크 모드로 전환">
                    <span class="theme-toggle-label">다크 모드</span>
                </button>
                <p class="range-note">기본 번호 1-45. 보너스 번호 1-20.</p>
            </div>
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
