<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NKQ3GMZ8BJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-NKQ3GMZ8BJ');
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <section class="tester-panel" aria-labelledby="app-title">
            <header class="panel-header">
                <p class="eyebrow">AI 얼굴상 분석</p>
                <h1 id="app-title">동물상 테스트</h1>
                <p class="subtitle">사진이나 카메라로 강아지상과 고양이상 중 더 가까운 결과를 확인해보세요.</p>
            </header>

            <section class="workspace" aria-label="테스트 영역">
                <div class="preview-card">
                    <div class="preview-frame">
                        <img class="image-preview" alt="선택한 이미지 미리보기" hidden>
                        <div class="webcam-preview" aria-label="카메라 미리보기"></div>
                        <p class="empty-preview">이미지 또는 카메라 화면</p>
                    </div>
                    <div class="controls">
                        <label class="file-button">
                            <input class="image-input" type="file" accept="image/*">
                            사진 선택
                        </label>
                        <button class="webcam-button" type="button">카메라 켜기</button>
                        <button class="analyze-button" type="button" disabled>분석하기</button>
                    </div>
                </div>

                <aside class="result-card" aria-live="polite">
                    <p class="result-kicker">결과</p>
                    <h2 class="result-title">대기 중</h2>
                    <p class="result-copy">모델을 불러오는 중입니다.</p>
                    <div class="meter-list"></div>
                    <p class="model-status">모델 준비 중</p>
                </aside>
            </section>

            <section class="partner-section" aria-labelledby="partner-title">
                <div class="partner-copy">
                    <p class="eyebrow">Partnership</p>
                    <h2 id="partner-title">제휴 문의</h2>
                    <p class="subtitle">광고, 협업, 서비스 제휴 제안은 아래 양식으로 보내주세요.</p>
                </div>

                <form class="partner-form" action="https://formspree.io/f/mdajeqwo" method="POST">
                    <input type="hidden" name="_subject" value="동물상 테스트 제휴 문의">
                    <label>
                        이름
                        <input type="text" name="name" autocomplete="name" required>
                    </label>
                    <label>
                        이메일
                        <input type="email" name="email" autocomplete="email" required>
                    </label>
                    <label>
                        회사/브랜드
                        <input type="text" name="company" autocomplete="organization">
                    </label>
                    <label>
                        문의 내용
                        <textarea name="message" rows="5" required></textarea>
                    </label>
                    <button class="submit-button" type="submit">문의 보내기</button>
                </form>
            </section>

            <section class="comments-section" aria-labelledby="comments-title">
                <div class="comments-copy">
                    <p class="eyebrow">Comments</p>
                    <h2 id="comments-title">댓글</h2>
                </div>
                <div id="disqus_thread"></div>
            </section>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
    <script>
        var disqus_config = function () {
            this.page.url = 'https://productbuilder-week1-116-5730e.web.app/';
            this.page.identifier = 'animal-type-test-home';
        };

        (function() {
            var d = document;
            var s = d.createElement('script');
            s.src = 'https://productbuilder-dgemhowiqp.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>댓글을 보려면 JavaScript를 활성화해 주세요.</noscript>
</body>
</html>
